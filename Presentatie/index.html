<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Mei MeshCore Maand — Hackerspace Drenthe</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    /* Inline fade transition for slide container */
    #slide-container {
      transition: opacity 300ms ease-in-out;
    }
  </style>
</head>
<body>

  <main id="slide-container"></main>

  <nav id="slide-nav">
    <button id="btn-prev" aria-label="Vorige slide" title="Vorige (←)">&#8592; Vorige</button>
    <span id="step-dots"></span>
    <span id="slide-number"></span>
    <button id="btn-next" aria-label="Volgende slide" title="Volgende (→)">Volgende &#8594;</button>
  </nav>
  <div id="progress-bar"></div>

  <div id="presenter-view"></div>

  <script type="module" src="engine.js"></script>

</body>
</html>
